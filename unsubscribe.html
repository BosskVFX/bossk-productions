<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsubscribe — Bossk Productions</title>
<meta name="robots" content="noindex, nofollow">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a0a;color:#f0ede8;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .box{text-align:center;padding:3rem;max-width:400px;}
  .title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:0.15em;margin-bottom:1rem;}
  .title span{color:#ff6b35;}
  .msg{color:#8a8680;font-size:0.9rem;line-height:1.6;margin-bottom:1.5rem;}
  .status{font-family:'Space Mono',monospace;font-size:0.75rem;letter-spacing:0.1em;color:#ff6b35;}
  a{color:#ff6b35;text-decoration:none;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
<div class="box">
  <div class="title">BOSSK <span>PRODUCTIONS</span></div>
  <div class="msg" id="msg">Processing your unsubscribe request...</div>
  <div class="status" id="status"></div>
</div>
<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const email = params.get('email');
  const msg = document.getElementById('msg');
  const status = document.getElementById('status');

  if (!email) {
    msg.textContent = 'Invalid unsubscribe link.';
    return;
  }

  try {
    const res = await fetch('/api/unsubscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if (data.success) {
      msg.textContent = 'You have been unsubscribed from The Bossk Brief.';
      status.textContent = 'You will no longer receive emails from us.';
    } else {
      msg.textContent = 'Something went wrong. Please try again.';
    }
  } catch (e) {
    msg.textContent = 'Something went wrong. Please try again.';
  }
})();
</script>
</body>
</html>
