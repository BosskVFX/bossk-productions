<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portal — Bossk Productions</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0a;--bg2:#111;--card:#161616;--text:#f0ede8;
    --dim:#8a8680;--accent:#ff6b35;--line:rgba(255,255,255,0.06);
    --display:'Bebas Neue',sans-serif;--mono:'Space Mono',monospace;--body:'DM Sans',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;}

  .portal-nav{
    padding:1.25rem 3rem;display:flex;align-items:center;
    border-bottom:1px solid var(--line);
  }
  .portal-logo{font-family:var(--display);font-size:1.4rem;letter-spacing:0.15em;color:var(--text);text-decoration:none;}
  .portal-logo span{color:var(--accent);}
  .logo-icon{height:1.4rem;margin-right:0.05em;vertical-align:middle;position:relative;top:-2px;}

  .portal-hero{
    width:100%;height:350px;object-fit:cover;object-position:center;
    border-bottom:1px solid var(--line);
  }

  .portal-content{
    max-width:800px;margin:0 auto;padding:3rem 2rem;
  }

  .portal-label{
    font-family:var(--mono);font-size:0.6rem;letter-spacing:0.25em;
    text-transform:uppercase;color:var(--accent);margin-bottom:0.5rem;
  }
  .portal-project{
    font-family:var(--display);font-size:clamp(2.5rem,5vw,3.5rem);
    letter-spacing:0.03em;line-height:1;margin-bottom:0.25rem;
  }
  .portal-client{
    font-size:1rem;color:var(--dim);margin-bottom:2.5rem;
  }

  .portal-notes{
    background:var(--card);border:1px solid var(--line);padding:1.5rem;
    font-size:0.9rem;line-height:1.7;color:var(--text);margin-bottom:2.5rem;
    white-space:pre-wrap;
  }

  .portal-links{
    display:flex;flex-direction:column;gap:0.75rem;
  }
  .portal-link{
    display:flex;align-items:center;gap:1rem;
    background:var(--card);border:1px solid var(--line);
    padding:1.25rem 1.5rem;text-decoration:none;
    transition:border-color 0.2s,transform 0.2s;
  }
  .portal-link:hover{border-color:var(--accent);transform:translateX(4px);}
  .portal-link-icon{
    width:48px;height:48px;border:2px solid var(--accent);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .portal-link-icon svg{width:22px;height:22px;fill:var(--accent);}
  .portal-link-label{
    font-family:var(--display);font-size:1.3rem;letter-spacing:0.05em;color:var(--text);
  }
  .portal-link-sub{
    font-family:var(--mono);font-size:0.55rem;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--dim);margin-top:0.15rem;
  }

  .portal-footer{
    max-width:800px;margin:0 auto;padding:2rem;
    border-top:1px solid var(--line);margin-top:3rem;
    font-family:var(--mono);font-size:0.55rem;color:var(--dim);
    letter-spacing:0.1em;text-align:center;
  }

  .loading{text-align:center;padding:8rem 2rem;color:var(--dim);font-family:var(--mono);font-size:0.75rem;}
  .error{text-align:center;padding:8rem 2rem;color:var(--dim);}
  .error h2{font-family:var(--display);font-size:2rem;margin-bottom:0.5rem;color:var(--text);}

  @media(max-width:600px){
    .portal-nav{padding:1rem 1.5rem;}
    .portal-hero{height:200px;}
    .portal-content{padding:2rem 1.5rem;}
    .portal-link{padding:1rem 1.25rem;}
  }
</style>
</head>
<body>

<nav class="portal-nav">
  <a href="https://www.bosskproductions.com" class="portal-logo"><img src="/logo-icon.png" alt="B" class="logo-icon">OSSK <span>PRODUCTIONS</span></a>
</nav>

<div id="portalContent">
  <div class="loading">Loading project...</div>
</div>

<script>
(async function() {
  const slug = window.location.pathname.replace(/^\//, '').replace(/\.html$/, '').toLowerCase();
  const container = document.getElementById('portalContent');

  if (!slug || slug === 'client') {
    container.innerHTML = '<div class="error"><h2>INVALID LINK</h2><p>This project link is not valid.</p></div>';
    return;
  }

  try {
    const res = await fetch('/api/client?slug=' + slug);
    if (!res.ok) {
      container.innerHTML = '<div class="error"><h2>PROJECT NOT FOUND</h2><p>This project may have expired or the link is incorrect.</p></div>';
      return;
    }

    const p = await res.json();
    document.title = (p['Project Name'] || 'Project') + ' — Bossk Productions';

    let html = '';

    // Hero image
    if (p['Header Image']) {
      html += `<img class="portal-hero" src="${p['Header Image']}" alt="${p['Project Name']}">`;
    }

    html += '<div class="portal-content">';
    html += `<div class="portal-label">Client Portal</div>`;
    html += `<div class="portal-project">${p['Project Name'] || ''}</div>`;
    html += `<div class="portal-client">${p['Client Name'] || ''}</div>`;

    // Notes
    if (p.Notes) {
      html += `<div class="portal-notes">${p.Notes}</div>`;
    }

    // Links
    html += '<div class="portal-links">';

    if (p['Frame IO Link']) {
      html += `
        <a href="${p['Frame IO Link']}" target="_blank" class="portal-link">
          <div class="portal-link-icon"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
          <div><div class="portal-link-label">REVIEW & COMMENT</div><div class="portal-link-sub">Open in Frame.io</div></div>
        </a>`;
    }

    if (p['Docs Link']) {
      html += `
        <a href="${p['Docs Link']}" target="_blank" class="portal-link">
          <div class="portal-link-icon"><svg viewBox="0 0 24 24"><path d="M14,2H6A2,2,0,0,0,4,4V20a2,2,0,0,0,2,2H18a2,2,0,0,0,2-2V8ZM13,3.5,18.5,9H13ZM6,20V4h5v7h7V20Z"/></svg></div>
          <div><div class="portal-link-label">PROJECT DOCS</div><div class="portal-link-sub">Open in Google Docs</div></div>
        </a>`;
    }

    if (p['Sheets Link']) {
      html += `
        <a href="${p['Sheets Link']}" target="_blank" class="portal-link">
          <div class="portal-link-icon"><svg viewBox="0 0 24 24"><path d="M3,3V21H21V3ZM9,19H5V13H9ZM9,11H5V5H9ZM19,19H11V13h8ZM19,11H11V5h8Z"/></svg></div>
          <div><div class="portal-link-label">PROJECT SHEET</div><div class="portal-link-sub">Open in Google Sheets</div></div>
        </a>`;
    }

    // Additional links
    if (p.Links) {
      const extraLinks = p.Links.split('\n').filter(Boolean);
      extraLinks.forEach(l => {
        const parts = l.split('|').map(s => s.trim());
        if (parts.length >= 2) {
          html += `
            <a href="${parts[1]}" target="_blank" class="portal-link">
              <div class="portal-link-icon"><svg viewBox="0 0 24 24"><path d="M3.9,12A8.1,8.1,0,0,1,12,3.9V2A10,10,0,0,0,2,12ZM12,20.1A8.1,8.1,0,0,1,3.9,12H2A10,10,0,0,0,12,22ZM20.1,12A8.1,8.1,0,0,1,12,20.1V22A10,10,0,0,0,22,12ZM12,3.9A8.1,8.1,0,0,1,20.1,12H22A10,10,0,0,0,12,2Z"/></svg></div>
              <div><div class="portal-link-label">${parts[0].toUpperCase()}</div><div class="portal-link-sub">Open link</div></div>
            </a>`;
        }
      });
    }

    html += '</div>'; // portal-links
    html += '</div>'; // portal-content
    html += '<div class="portal-footer">&copy; 2026 BOSSK PRODUCTIONS LLC — LOS ANGELES, CA</div>';

    container.innerHTML = html;

  } catch (e) {
    container.innerHTML = '<div class="error"><h2>SOMETHING WENT WRONG</h2><p>Please try again or contact us.</p></div>';
  }
})();
</script>
</body>
</html>
