<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Studies — Bossk Productions</title>
<meta name="description" content="See how Bossk Productions builds creative previews and AI productions for brands worldwide.">
<meta name="robots" content="index, follow">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0a;--bg2:#111;--card:#161616;--text:#f0ede8;
    --dim:#8a8680;--accent:#ff6b35;--line:rgba(255,255,255,0.06);
    --display:'Bebas Neue',sans-serif;--mono:'Space Mono',monospace;--body:'DM Sans',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--body);}

  nav{
    position:fixed;top:0;width:100%;z-index:100;padding:1.25rem 3rem;
    display:flex;justify-content:space-between;align-items:center;
    background:rgba(10,10,10,0.85);backdrop-filter:blur(20px);
    border-bottom:1px solid var(--line);
  }
  .logo{font-family:var(--display);font-size:1.6rem;letter-spacing:0.15em;color:var(--text);text-decoration:none;}
  .logo span{color:var(--accent);}
  .logo-icon { height:1.6rem; margin-right:0.05em; vertical-align:middle; position:relative; top:-2px; }
  .nav-links{display:flex;gap:2.5rem;align-items:center;list-style:none;}
  .nav-links a{font-family:var(--mono);font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);text-decoration:none;}
  .nav-links a:hover{color:var(--text);}
  .nav-cta{background:var(--accent)!important;color:var(--bg)!important;padding:0.55rem 1.4rem;font-weight:700;}

  .page-header{
    padding:10rem 3rem 4rem;max-width:1200px;margin:0 auto;
  }
  .page-label{font-family:var(--mono);font-size:0.75rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;}
  .page-title{font-family:var(--display);font-size:clamp(3rem,6vw,5rem);line-height:1;}

  .cases{padding:0 3rem 6rem;max-width:1200px;margin:0 auto;}
  .case-card{
    background:var(--card);border:1px solid var(--line);padding:3rem;
    margin-bottom:1.5rem;transition:border-color 0.3s;
  }
  .case-card:hover{border-color:rgba(255,107,53,0.25);}
  .case-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;gap:2rem;}
  .case-title{font-family:var(--display);font-size:2rem;letter-spacing:0.03em;}
  .case-subtitle{color:var(--dim);font-size:0.95rem;margin-top:0.25rem;}
  .case-tags{display:flex;gap:0.5rem;flex-wrap:wrap;flex-shrink:0;}
  .case-tag{
    font-family:var(--mono);font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;
    padding:0.3rem 0.65rem;border:1px solid rgba(255,107,53,0.15);
    background:rgba(255,107,53,0.08);color:var(--accent);
  }
  .case-type{
    font-family:var(--mono);font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;
    padding:0.3rem 0.65rem;border:1px solid var(--line);color:var(--dim);
  }
  .case-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;margin-bottom:1.5rem;}
  .case-section-label{
    font-family:var(--mono);font-size:0.55rem;letter-spacing:0.2em;
    text-transform:uppercase;color:var(--accent);margin-bottom:0.4rem;
  }
  .case-section-text{color:var(--dim);font-size:0.88rem;line-height:1.7;}
  .case-quote{
    border-left:3px solid var(--accent);padding-left:1.25rem;
    font-style:italic;color:var(--text);font-size:1rem;line-height:1.6;
  }
  .case-hero{width:100%;height:300px;object-fit:cover;object-position:top;margin-bottom:2rem;border:1px solid var(--line);}
  .case-images{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem;margin-top:1.5rem;}
  .case-images img{width:100%;aspect-ratio:16/9;object-fit:cover;border:1px solid var(--line);}
  .case-date{font-family:var(--mono);font-size:0.55rem;color:var(--dim);letter-spacing:0.1em;margin-top:1rem;}

  .empty{text-align:center;padding:6rem 2rem;color:var(--dim);font-size:1rem;}
  .loading{text-align:center;padding:6rem 2rem;color:var(--dim);font-family:var(--mono);font-size:0.75rem;letter-spacing:0.1em;}

  .back-link{
    display:inline-block;margin-top:2rem;
    font-family:var(--mono);font-size:0.7rem;letter-spacing:0.12em;
    text-transform:uppercase;color:var(--accent);text-decoration:none;
  }

  @media(max-width:900px){
    nav{padding:1rem 1.5rem;}
    .page-header{padding:8rem 1.5rem 3rem;}
    .cases{padding:0 1.5rem 4rem;}
    .case-card{padding:2rem;}
    .case-grid{grid-template-columns:1fr;}
    .case-top{flex-direction:column;gap:1rem;}
  }

  .hamburger {
    display:none;
    background:none; border:none; cursor:pointer;
    flex-direction:column; gap:5px; padding:4px;
    z-index:101; position:relative;
  }
  .hamburger span {
    display:block; width:24px; height:2px;
    background:var(--text); transition:all 0.3s;
  }
  .mobile-menu {
    display:none; position:fixed; inset:0; z-index:99;
    background:rgba(10,10,10,0.97); backdrop-filter:blur(20px);
    flex-direction:column; align-items:center; justify-content:center;
    gap:2.5rem;
  }
  .mobile-menu.active { display:flex; }
  .mobile-menu a {
    font-family:var(--display); font-size:2rem;
    letter-spacing:0.1em; color:var(--text);
    text-decoration:none; transition:color 0.2s;
  }
  .mobile-menu a:hover { color:var(--accent); }
  .mobile-menu .nav-cta {
    background:var(--accent); color:var(--bg)!important;
    padding:0.75rem 2rem; font-family:var(--mono);
    font-size:0.8rem; letter-spacing:0.12em; text-transform:uppercase;
  }
  .mobile-close {
    position:absolute; top:1.5rem; right:1.5rem;
    background:none; border:none; color:var(--dim);
    font-size:2rem; cursor:pointer;
  }

  @media(max-width:600px){
    .nav-links{display:none;}
    .hamburger{display:flex;}
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo"><img src="/logo-icon.png" alt="B" class="logo-icon">OSSK <span>PRODUCTIONS</span></a>
  <ul class="nav-links">
    <li><a href="/#services">Services</a></li>
    <li><a href="/#work">Work</a></li>
    <li><a href="/case-studies.html">Case Studies</a></li>
    <li><a href="/#team">Team</a></li>
    <li><a href="/#contact" class="nav-cta">Let's Talk</a></li>
  </ul>
  <button class="hamburger" onclick="document.getElementById('mobileMenu').classList.toggle('active')">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-close" onclick="this.parentElement.classList.remove('active')">&times;</button>
  <a href="/#services" onclick="this.parentElement.classList.remove('active')">SERVICES</a>
  <a href="/#work" onclick="this.parentElement.classList.remove('active')">WORK</a>
  <a href="/case-studies.html" onclick="this.parentElement.classList.remove('active')">CASE STUDIES</a>
  <a href="/#team" onclick="this.parentElement.classList.remove('active')">TEAM</a>
  <a href="/#contact" class="nav-cta" onclick="this.parentElement.classList.remove('active')">LET'S TALK</a>
</div>

<div class="page-header">
  <div class="page-label">Case Studies</div>
  <h1 class="page-title">THE WORK SPEAKS</h1>
</div>

<div class="cases" id="casesList">
  <div class="loading">Loading case studies...</div>
</div>

<script>
async function loadCases() {
  const container = document.getElementById('casesList');
  try {
    const res = await fetch('/api/cases');
    const cases = await res.json();

    if (!cases.length) {
      container.innerHTML = '<div class="empty">Case studies coming soon.<br><a href="/" class="back-link">← Back to Home</a></div>';
      return;
    }

    container.innerHTML = cases.reverse().map(c => {
      const services = (c.Services || '').split(',').map(s => s.trim()).filter(Boolean);
      const date = c.Date ? new Date(c.Date).toLocaleDateString('en-US', { year:'numeric', month:'long' }) : '';
      const slug = (c.Title || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/,'');
      const extraImgs = (c['Extra Images'] || '').split(',').map(s => s.trim()).filter(Boolean);
      const videoUrl = c['Video URL'] || '';
      let videoEmbed = '';
      if (videoUrl) {
        const vimeoMatch = videoUrl.match(/vimeo\.com\/(\d+)/);
        const ytMatch = videoUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
        const frameMatch = videoUrl.match(/app\.frame\.io/) || videoUrl.match(/f\.io/);
        if (vimeoMatch) videoEmbed = '<iframe src="https://player.vimeo.com/video/' + vimeoMatch[1] + '?title=0&byline=0&portrait=0" style="width:100%;aspect-ratio:16/9;border:1px solid rgba(255,255,255,0.06);margin:1.5rem 0;" frameborder="0" allowfullscreen></iframe>';
        else if (ytMatch) videoEmbed = '<iframe src="https://www.youtube.com/embed/' + ytMatch[1] + '" style="width:100%;aspect-ratio:16/9;border:1px solid rgba(255,255,255,0.06);margin:1.5rem 0;" frameborder="0" allowfullscreen></iframe>';
        else if (frameMatch) videoEmbed = '<a href="' + videoUrl + '" target="_blank" style="display:block;background:#161616;border:1px solid #ff6b35;padding:1.5rem;text-align:center;margin:1.5rem 0;text-decoration:none;"><span style="font-family:\'Bebas Neue\',sans-serif;font-size:1.2rem;color:#ff6b35;letter-spacing:0.1em;">REVIEW ON FRAME.IO</span></a>';
        else videoEmbed = '<a href="' + videoUrl + '" target="_blank" style="display:block;background:#161616;border:1px solid rgba(255,255,255,0.06);padding:1.5rem;text-align:center;margin:1.5rem 0;text-decoration:none;"><span style="font-family:\'Bebas Neue\',sans-serif;font-size:1.2rem;color:#f0ede8;letter-spacing:0.1em;">WATCH VIDEO</span></a>';
      }
      return `
        <div class="case-card" id="${slug}">
          ${c['Hero Image'] ? `<img class="case-hero" src="${c['Hero Image']}" alt="${c.Title}" loading="lazy">` : ''}
          ${videoEmbed}
          <div class="case-top">
            <div>
              <div class="case-title">${c.Title || ''}</div>
              <div class="case-subtitle">${c.Subtitle || ''}</div>
            </div>
            <div class="case-tags">
              ${c['Client Type'] ? `<span class="case-tag">${c['Client Type']}</span>` : ''}
              ${services.map(s => `<span class="case-type">${s}</span>`).join('')}
            </div>
          </div>
          <div class="case-grid">
            <div>
              <div class="case-section-label">Challenge</div>
              <div class="case-section-text">${c.Challenge || ''}</div>
            </div>
            <div>
              <div class="case-section-label">Solution</div>
              <div class="case-section-text">${c.Solution || ''}</div>
            </div>
            <div>
              <div class="case-section-label">Result</div>
              <div class="case-section-text">${c.Result || ''}</div>
            </div>
          </div>
          ${c.Quote ? `<div class="case-quote">"${c.Quote}"</div>` : ''}
          ${extraImgs.length ? `<div class="case-images">${extraImgs.map(img => `<img src="${img}" alt="${c.Title}" loading="lazy">`).join('')}</div>` : ''}
          ${date ? `<div class="case-date">${date}</div>` : ''}
        </div>
      `;
    }).join('');

    // Scroll to specific case study if hash present
    if (window.location.hash) {
      const el = document.getElementById(window.location.hash.slice(1));
      if (el) {
        setTimeout(() => el.scrollIntoView({ behavior: 'smooth' }), 300);
      }
    }

  } catch (e) {
    container.innerHTML = '<div class="empty">Unable to load case studies.<br><a href="/" class="back-link">← Back to Home</a></div>';
    console.error(e);
  }
}
loadCases();
</script>
<!-- CHAT WIDGET -->
<style>
  .chat-btn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:150;width:56px;height:56px;border-radius:50%;border:none;background:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(255,107,53,0.3);transition:transform 0.2s;}
  .chat-btn:hover{transform:scale(1.08);} .chat-btn::before{content:"Message us now";position:absolute;right:68px;top:50%;transform:translateY(-50%);background:#ff6b35;color:#0a0a0a;border:none;font-weight:700;font-family:var(--mono);font-size:0.65rem;letter-spacing:0.05em;padding:0.6rem 1.1rem;white-space:nowrap;border-radius:50px;text-transform:uppercase;font-size:0.72rem;opacity:0;pointer-events:none;transition:opacity 0.2s;} .chat-btn:hover::before{opacity:1;} .chat-btn.active::before{display:none;}
  .chat-btn svg{width:24px;height:24px;fill:#0a0a0a;}
  .chat-btn.active svg.icon-chat{display:none;} .chat-btn:not(.active) svg.icon-close{display:none;}
  .chat-panel{position:fixed;bottom:5.5rem;right:1.5rem;z-index:150;width:340px;background:var(--card);border:1px solid var(--line);display:none;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,0.5);}
  .chat-panel.active{display:flex;}
  .chat-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--line);}
  .chat-header-title{font-family:var(--display);font-size:1.2rem;letter-spacing:0.05em;}
  .chat-header-sub{font-size:0.75rem;color:var(--dim);margin-top:0.15rem;}
  .chat-body{padding:1.25rem 1.5rem;}
  .chat-field{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--line);padding:0.6rem 0.75rem;font-family:var(--body);font-size:0.85rem;outline:none;margin-bottom:0.6rem;}
  .chat-field:focus{border-color:var(--accent);} .chat-field::placeholder{color:rgba(138,134,128,0.5);}
  textarea.chat-field{resize:none;height:80px;}
  .chat-send{width:100%;background:var(--accent);color:var(--bg);font-family:var(--mono);font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:0.75rem;border:none;cursor:pointer;}
  .chat-send:disabled{background:rgba(255,107,53,0.3);cursor:not-allowed;}
  .chat-sent{text-align:center;padding:2rem 1.5rem;font-family:var(--mono);font-size:0.7rem;color:var(--accent);letter-spacing:0.1em;}
  @media(max-width:600px){.chat-panel{width:calc(100% - 2rem);right:1rem;bottom:5rem;} .chat-btn{bottom:1rem;right:1rem;}}
</style>
<button class="chat-btn" id="chatBtn" onclick="toggleChat()">
  <svg class="icon-chat" viewBox="0 0 24 24"><path d="M20,2H4A2,2,0,0,0,2,4V22l4-4H20a2,2,0,0,0,2-2V4A2,2,0,0,0,20,2Zm0,14H6l-2,2V4H20Z"/></svg>
  <svg class="icon-close" viewBox="0 0 24 24"><path d="M19,6.41,17.59,5,12,10.59,6.41,5,5,6.41,10.59,12,5,17.59,6.41,19,12,13.41,17.59,19,19,17.59,13.41,12Z"/></svg>
</button>
<div class="chat-panel" id="chatPanel">
  <div class="chat-header"><div class="chat-header-title">GET IN TOUCH</div><div class="chat-header-sub">We typically respond within a few hours.</div></div>
  <div class="chat-body" id="chatBody">
    <input class="chat-field" id="chatName" placeholder="Your name">
    <input class="chat-field" id="chatEmail" placeholder="Your email">
    <textarea class="chat-field" id="chatMsg" placeholder="How can we help?"></textarea>
    <button class="chat-send" id="chatSend" onclick="sendChat()">Send Message</button>
  </div>
</div>
<script>
function toggleChat(){document.getElementById('chatBtn').classList.toggle('active');document.getElementById('chatPanel').classList.toggle('active');}
async function sendChat(){const msg=document.getElementById('chatMsg').value;if(!msg.trim())return;const btn=document.getElementById('chatSend');btn.disabled=true;btn.textContent='Sending...';try{await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('chatName').value,email:document.getElementById('chatEmail').value,message:msg})});document.getElementById('chatBody').innerHTML='<div class="chat-sent">Message sent!<br><br>We\'ll get back to you soon.</div>';}catch(e){btn.textContent='Send Message';btn.disabled=false;}}
</script>
</body>
</html>
